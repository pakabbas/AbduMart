name: Deploy to GCP

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-gcp-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to abdumarket.spiralloopstechnologies.com
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCP2_SSH_HOST }}
          username: ${{ secrets.GCP2_SSH_USER }}
          key: ${{ secrets.GCP2_SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          command_timeout: 15m
          script: |
            set -e
            DEPLOY_PATH="/var/www/abdumart"
            if [ -n "${{ secrets.GCP2_DEPLOY_PATH }}" ]; then
              DEPLOY_PATH="${{ secrets.GCP2_DEPLOY_PATH }}"
            fi
            export DEPLOY_PATH
            cd "$DEPLOY_PATH"
            echo "==> Syncing latest main before deploy..."
            git fetch origin main
            git reset --hard origin/main
            bash deploy/deploy.sh

      - name: Deployment summary
        run: |
          echo "Deployed to https://abdumarket.spiralloopstechnologies.com"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
